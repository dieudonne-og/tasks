<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMS · Sign in</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>TaskMS<span class="brand-dot">.</span></h1>
      <p class="sub">HR Task Management &amp; AI Deadline Prediction</p>
      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" value="admin@uok.ac.rw" required>
        <label for="password">Password</label>
        <input type="password" id="password" value="admin123" required>
        <button class="btn" type="submit">Sign in</button>
        <div class="error" id="error"></div>
      </form>
      <div class="demo">
        Demo accounts (password in parentheses):<br>
        <code>admin@uok.ac.rw</code> (admin123) — Admin<br>
        <code>manager@uok.ac.rw</code> (manager123) — HR Manager<br>
        <code>alice@uok.ac.rw</code> (officer123) — HR Officer
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    if (API.token()) location.href = 'dashboard.html';
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const error = document.getElementById('error');
      error.textContent = '';
      try {
        const res = await API.post('/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        API.setSession(res.token, {
          userId: res.userId, fullName: res.fullName, email: res.email, role: res.role,
        });
        location.href = 'dashboard.html';
      } catch (err) {
        error.textContent = err.message || 'Login failed';
      }
    });
  </script>
</body>
</html>
