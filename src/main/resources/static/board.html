<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMS · Board</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav id="nav"></nav>
  <aside id="sidebar" class="sidebar"></aside>
  <div class="page">
    <div class="page-head">
      <h2>Task Board</h2>
      <button class="btn btn-sm" id="newTaskBtn">+ New task</button>
    </div>
    <div class="board" id="board"></div>
  </div>

  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h3 id="modalTitle">New task</h3>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <label>Title</label>
        <input id="f_title" required>
        <label>Description</label>
        <textarea id="f_description"></textarea>
        <div class="row2">
          <div>
            <label>Task type</label>
            <select id="f_taskTypeId" required></select>
          </div>
          <div>
            <label>Assignee</label>
            <select id="f_assigneeId" required></select>
          </div>
        </div>
        <div class="row2">
          <div>
            <label>Complexity</label>
            <select id="f_complexity">
              <option value="LOW">Low</option>
              <option value="MEDIUM" selected>Medium</option>
              <option value="HIGH">High</option>
            </select>
          </div>
          <div>
            <label>Your estimate (days)</label>
            <input type="number" step="0.5" min="0" id="f_estimatedDurationDays">
          </div>
        </div>
        <div class="row2">
          <div>
            <label>Start date</label>
            <input type="date" id="f_startDate">
          </div>
          <div>
            <label>Due date</label>
            <input type="date" id="f_dueDate" required>
          </div>
        </div>
        <div id="predictBox" class="card predict" style="display:none;"></div>
        <div class="error" id="formError"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelBtn" style="flex:1;">Cancel</button>
          <button type="submit" class="btn" style="flex:1;">Save</button>
        </div>
      </form>
      <div id="completeSection" class="section-gap" style="display:none;">
        <h4 class="muted">Complete task</h4>
        <div class="row2">
          <div>
            <label>Actual effort (days)</label>
            <input type="number" step="0.5" min="0.5" id="f_actual">
          </div>
          <div>
            <label>Completed date</label>
            <input type="date" id="f_completedDate">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="startBtn" style="flex:1;">Mark in progress</button>
          <button type="button" class="btn" id="completeBtn" style="flex:1;background:var(--ok);">Mark complete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
