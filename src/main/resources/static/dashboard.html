<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMS · Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav id="nav"></nav>
  <aside id="sidebar" class="sidebar"></aside>
  <div class="page">
    <div class="page-head">
      <h2>Reporting Dashboard</h2>
      <button class="btn btn-sm" id="retrainBtn" style="display:none;">Retrain models</button>
    </div>
    <div class="grid stats" id="stats"></div>

    <div class="grid two-col section-gap">
      <div class="panel">
        <h4>Estimate accuracy — manual vs AI (mean abs error, days)</h4>
        <div id="accuracy"></div>
        <p class="muted" id="accuracyNote"></p>
      </div>
      <div class="panel">
        <h4>Tasks by type</h4>
        <div id="byType"></div>
      </div>
    </div>

    <div class="grid two-col section-gap">
      <div class="panel">
        <h4>Predicted workload per staff (days)</h4>
        <div id="workload"></div>
      </div>
      <div class="panel">
        <h4>Model performance (latest training)</h4>
        <div id="models"></div>
      </div>
    </div>

    <div class="panel section-gap">
      <h4>Workload rebalancing suggestions</h4>
      <div id="suggestions"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
